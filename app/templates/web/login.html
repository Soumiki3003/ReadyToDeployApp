{% extends "base.html" %}
{% block title %}Login - KnowledgeGraph{% endblock %}

{% block content %}
<div class="hero min-h-screen">
  <div class="card w-96 bg-primary text-primary-content shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl justify-center">Instructor Login</h2>

      <form hx-post="{{ url_for('main.login') }}" hx-target="#login-result" hx-swap="innerHTML">

        <div class="form-control">
          <label class="label"><span class="label-text text-primary-content">Username</span></label>
          <input type="text" name="username" placeholder="Username" class="input input-bordered bg-primary-focus"
            required>
        </div>

        <div class="form-control mt-2">
          <label class="label"><span class="label-text text-primary-content">Password</span></label>
          <input type="password" name="password" placeholder="Password" class="input input-bordered bg-primary-focus"
            required>
        </div>

        <div class="card-actions justify-center mt-6">
          <button type="submit" class="btn btn-accent w-full">
            <span class="htmx-indicator loading loading-spinner"></span>
            Login
          </button>
        </div>
      </form>

      <div id="login-result"></div>
    </div>
  </div>
</div>
{% endblock %}
