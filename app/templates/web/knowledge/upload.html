{% extends "base.html" %} 
{% block title %}Uploads - KnowledgeGraph{% endblock%} 
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Course Material Uploads</h1>
    <button class="btn btn-primary" onclick="upload_modal.showModal()">
        New Upload
    </button>
</div>

<div
    id="upload-list"
    hx-get="{{ url_for('knowledge.upload_list') }}"
    hx-trigger="load, every 3s"
    hx-swap="innerHTML"
>
    <span class="loading loading-spinner loading-lg"></span>
</div>

<dialog id="upload_modal" class="modal">
    <div class="modal-box bg-primary text-primary-content">
        <h3 class="font-bold text-2xl mb-4">Upload Course Materials</h3>

        <form
            id="upload-form"
            hx-post="{{ url_for('knowledge.upload_submit') }}"
            hx-encoding="multipart/form-data"
            hx-swap="none"
        >
            <label class="form-control">
                <div class="label">
                    <span class="label-text text-primary-content"
                        >Upload Files</span
                    >
                </div>
                <input
                    type="file"
                    name="files"
                    multiple
                    required
                    accept="{{ allowed_extensions|join(',') }}"
                    class="file-input file-input-bordered file-input-accent"
                />
            </label>

            <label class="form-control mt-4">
                <div class="label">
                    <span class="label-text text-primary-content"
                        >HTML Link (Optional)</span
                    >
                </div>
                <input
                    type="text"
                    name="html_link"
                    placeholder="https://example.com"
                    class="input input-bordered bg-primary-focus"
                />
            </label>

            <div class="modal-action">
                <button
                    type="button"
                    class="btn btn-ghost"
                    onclick="upload_modal.close()"
                >
                    Cancel
                </button>
                <button type="submit" class="btn btn-accent">
                    <span
                        class="htmx-indicator loading loading-spinner loading-xs"
                    ></span>
                    Submit
                </button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>

<script>
    document.body.addEventListener("htmx:afterRequest", function (evt) {
        if (evt.detail.target.id === "upload-form" && evt.detail.successful) {
            upload_modal.close();
            evt.detail.target.reset();
            htmx.trigger("#upload-list", "load");
        }
    });
</script>
{% endblock %}
