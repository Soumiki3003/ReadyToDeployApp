services:
  neo4j:
    image: neo4j:2026.01.3
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
    volumes:
      - neo4j_data:/data

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./.docker/ollama.entrypoint.sh:/entrypoint.sh

volumes:
  neo4j_data:
  ollama_data:
