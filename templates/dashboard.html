<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instructor Dashboard</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: "Rubik", sans-serif; margin:0; background:#F4F4F4; }

  /* Top bar */
  .top-bar { background-color: #148e88; color:white; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 3px 6px rgba(0,0,0,0.1);}
  .top-bar h1 { margin:0; font-size:22px; font-weight:500;}
  .top-bar .nav-buttons button { margin-left:10px; padding:6px 14px; border:none; border-radius:4px; background-color:#61e9e2; color:#03312E; font-weight:bold; cursor:pointer;}
  .top-bar .nav-buttons button:hover { background-color:#fff;}

  /* Sections */
  .section { display:none; padding:20px;}
  .section.active { display:block;}

  /* Upload form */
  #upload-section form { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:500px; }
  #upload-section input[type="file"], #upload-section input[type="text"] { width:90%; margin-bottom:10px; padding:8px; border-radius:10px; border:1px solid #ccc; }
  #upload-section button { padding:8px 16px; border:none; background-color:#00B7B5; color:#03312E; border-radius:4px; font-weight:bold; cursor:pointer;}
  #upload-section button:hover { background-color:#00D4C8; }

  /* KG iframe */
  #kg-section iframe { width:100%; height:700px; border:none; }

  /* Student progress charts */
  #progress-section { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
  .chart-container { width:100%; height:350px; margin-bottom:30px; }

  /* Slide-in overlay */
  #overlay-panel {
    position: fixed;
    top: 0;
    right: -500px; /* hidden initially */
    width: 400px;
    height: 100%;
    background: white;
    box-shadow: -4px 0 8px rgba(0,0,0,0.2);
    padding: 20px;
    overflow-y: auto;
    transition: right 0.3s ease;
    z-index: 1000;
  }
  #overlay-panel.active { right:0; }
  #overlay-panel h3 { margin-top:0; }
  #overlay-close { position:absolute; top:10px; right:10px; background:#f44336; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; }
  #overlay-panel a { cursor:pointer; color:#148e88; text-decoration:underline; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Instructor Dashboard</h1>
  <div class="nav-buttons">
    <button id="btn-upload">Upload PDF/HTML</button>
    <button id="btn-kg">Knowledge Graph</button>
    <button id="btn-progress">Student Progress</button>
  </div>
</div>

<!-- Upload Section -->
<div id="upload-section" class="section">
  <h2>Upload New PDF/HTML</h2>
  <form id="upload-form" enctype="multipart/form-data">
    <input type="file" name="files" multiple>
    <input type="text" name="html_link" placeholder="HTML link (optional)">
    <button type="submit">Upload</button>
  </form>
  <div id="upload-result"></div>
</div>

<!-- KG Section -->
<div id="kg-section" class="section">
  <h2>Knowledge Graph</h2>
  <iframe src="/graph"></iframe>
</div>

<!-- Student Progress Section -->
<div id="progress-section" class="section">
  <h2>Student Progress Dashboard</h2>

  <h3>Node-Level Struggle</h3>
  <div class="chart-container">
    <canvas id="node-chart"></canvas>
  </div>

  <h3>Student-Level Struggle</h3>
  <div class="chart-container">
    <canvas id="student-chart"></canvas>
  </div>
</div>

<!-- Slide-in overlay -->
<div id="overlay-panel">
  <button id="overlay-close">Close</button>
  <div id="overlay-content"></div>

  <!-- Nested student chat inside overlay -->
  <div id="student-chat" style="display:none; margin-top:20px; border-top:1px solid #ccc; padding-top:10px;">
    <h4 id="student-title"></h4>
    <div id="chat-log" style="background:#f0f0f0; padding:10px; border-radius:6px; max-height:300px; overflow-y:auto;"></div>
  </div>
</div>

<script>
const sections = {
  "btn-upload": document.getElementById("upload-section"),
  "btn-kg": document.getElementById("kg-section"),
  "btn-progress": document.getElementById("progress-section")
};
document.getElementById("btn-upload").click();
Object.keys(sections).forEach(btnId=>{
  document.getElementById(btnId).onclick=()=>{
    Object.values(sections).forEach(sec=>sec.classList.remove("active"));
    sections[btnId].classList.add("active");
    if(btnId==="btn-progress") loadStudentProgress();
  };
});

// Upload
const uploadForm = document.getElementById("upload-form");
uploadForm.addEventListener("submit", async (e)=>{
  e.preventDefault();
  const formData = new FormData(uploadForm);
  const res = await fetch("/upload",{method:"POST",body:formData});
  const data = await res.json();
  document.getElementById("upload-result").innerText=JSON.stringify(data,null,2);
});

// Overlay
const overlayPanel = document.getElementById("overlay-panel");
const overlayContent = document.getElementById("overlay-content");
document.getElementById("overlay-close").onclick = ()=>overlayPanel.classList.remove("active");

// Student Progress
async function loadStudentProgress(){
  const res = await fetch("/student-progress-data");
  const data = await res.json();

  // Node-Level Chart
  const nodeCounts = {};
  const nodeStudents = {};
  const studentMap = {};
  data.students?.forEach(s=>{
    studentMap[s.id]=s.trajectory||[];
    s.trajectory?.forEach(t=>{
      t.retrieved_nodes?.forEach(n=>{
        nodeCounts[n]=(nodeCounts[n]||0)+1;
        if(!nodeStudents[n]) nodeStudents[n]=new Set();
        nodeStudents[n].add(s.id);
      });
    });
  });

  const nodeCtx = document.getElementById("node-chart").getContext("2d");
  if(window.nodeChart) window.nodeChart.destroy();
  window.nodeChart = new Chart(nodeCtx,{
    type:'line',
    data:{
      labels:Object.keys(nodeCounts),
      datasets:[{label:'# Total entries', data:Object.values(nodeCounts), borderColor:'#148e88', backgroundColor:'#61e9e2', fill:false, tension:0.2, pointRadius:6}]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true}},
      onClick:(evt, elements)=>{
        if(!elements.length) return;
        const idx=elements[0].index;
        const node=Object.keys(nodeCounts)[idx];
        showOverlay(node,nodeStudents[node],studentMap);
      }
    }
  });

  // Student-Level Chart
  const studentCounts = {};
  data.students?.forEach(s=>{
    studentCounts[s.id]=s.trajectory?.length||0;
  });
  const studentCtx = document.getElementById("student-chart").getContext("2d");
  if(window.studentChart) window.studentChart.destroy();
  window.studentChart = new Chart(studentCtx,{
    type:'bar',
    data:{
      labels:Object.keys(studentCounts),
      datasets:[{label:'# Interactions', data:Object.values(studentCounts), backgroundColor:'#61e9e2'}]
    },
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
  });
}

// Show overlay panel
function showOverlay(nodeName, studentsSet, studentMap) {
  overlayPanel.classList.add('active');
  overlayContent.innerHTML = `
    <h3>Node: ${nodeName}</h3>
    <p><strong>Total Students Stuck:</strong> ${studentsSet.size}</p>
    <div id="node-student-list"><strong>Students:</strong></div>
  `;

  const listDiv = document.getElementById('node-student-list');
  listDiv.innerHTML = ''; // clear previous
  studentsSet.forEach(sid => {
    const count = studentMap[sid].filter(entry => entry.retrieved_nodes.includes(nodeName)).length;

    const studentDiv = document.createElement('div');
    studentDiv.style.marginBottom = '6px';

    const a = document.createElement('a');
    a.href = '#';
    a.innerText = `${sid} (Queries: ${count})`;
    a.onclick = (e) => {
      e.preventDefault();
      showStudentChat(sid, studentMap[sid]);
    };

    studentDiv.appendChild(a);
    listDiv.appendChild(studentDiv);
  });

  // Hide nested chat until a student is clicked
  document.getElementById("student-chat").style.display = 'none';
}

function showStudentChat(studentId, trajectory){
  const chatDiv = document.getElementById("chat-log");
  chatDiv.innerHTML = ''; // clear previous
  document.getElementById("student-chat").style.display='block';
  document.getElementById("student-title").innerText=`Student: ${studentId}`;

  trajectory.forEach(entry => {
    const p = document.createElement('p');
    p.innerHTML = `
      <strong>${entry.timestamp}:</strong> ${entry.query}<br>
      <em>Nodes retrieved:</em> ${entry.retrieved_nodes.join(', ')}<br>
      <em>Hint triggered:</em> ${entry.hint_triggered ? entry.hint_text : 'No'}<hr>
    `;
    chatDiv.appendChild(p);
  });
}
</script>

</body>
</html>
